services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: broker
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: broker
    ports:
      - "5432:5432"
    volumes:
      - broker-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      BROKER_DATA_MODE: demo
    ports:
      - "8765:8765"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8765
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  broker-postgres:

